name: create-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 2.0.0)'
        required: true
        type: string
      release-name:
        description: 'Release name (optional, e.g. Cool Name goes HERE!!)'
        required: false
        type: string
        default: ''
      branch:
        description: 'Branch to build from (defaults to main)'
        required: false
        type: string
        default: main
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Build release title
        id: title
        run: |
          VERSION="v${{ inputs.version }}"
          NAME="${{ inputs.release-name }}"
          if [ -n "$NAME" ]; then
            echo "value=${VERSION} : ${NAME}" >> $GITHUB_OUTPUT
          else
            echo "value=${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog entry and known issues
        run: |
          python3 - <<'PYEOF'
          import re

          with open('CHANGELOG.md', 'r') as f:
              content = f.read()

          match = re.search(r'## \[(?!Unreleased).*?\].*?\n(.*?)(?=\n## \[|\Z)', content, re.DOTALL)
          if not match:
              raise SystemExit('No version entry found in CHANGELOG.md')

          entry = match.group(1).strip()

          ki_match = re.search(r'### Known Issues\n(.*?)(?=\n### |\Z)', entry, re.DOTALL)
          if ki_match:
              known_issues = ki_match.group(1).strip()
              rest = re.sub(r'\n### Known Issues\n.*?(?=\n### |\Z)', '', entry, flags=re.DOTALL).strip()
          else:
              known_issues = ''
              rest = entry

          with open('known_issues.md', 'w') as f:
              f.write(known_issues)

          with open('changelog_entry.md', 'w') as f:
              f.write(rest)
          PYEOF

      - name: Build release body
        run: |
          {
            if [ -s "known_issues.md" ]; then
              echo "## Known Issues"
              cat known_issues.md
              printf "\n---\n"
            fi
            cat changelog_entry.md
          } > release_body.md

      - name: Package mod
        run: |
          mkdir -p staging/JustReadTheInstructions
          cp -r JustReadTheInstructions/. staging/JustReadTheInstructions/
          cd staging
          zip -r "../JustReadTheInstructions-${{ inputs.version }}.zip" JustReadTheInstructions/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ steps.title.outputs.value }}
          body_path: release_body.md
          files: JustReadTheInstructions-${{ inputs.version }}.zip
          draft: false
          prerelease: ${{ inputs.prerelease }}
          make_latest: ${{ inputs.prerelease == false }}