KERBALCHANGELOG
{
    showChangelog = True
    modName = Just Read The Instructions
    license = MIT
    author = Mathieu Relmy

    VERSION
    {
        version = 2.3.0
        CHANGE
        {
            change = Added
            subchange = (Experimental) Option to disable the web streaming server entirely - run JRTI with in-game camera windows only, no HTTP server, browser streaming, or recording. Lighter on low-end machines. Toggle in Settings > Stream / Capture, or set EnableStreamServer in settings.cfg. Takes effect on next flight scene entry
            subchange = Per-camera brightness, contrast, and gamma controls in the web viewer - adjustments are applied server-side so all viewers on the local network see the same image
            subchange = Per-camera FOV control in the web viewer (shown when the camera reports a valid FOV range from KSP)
        }
        CHANGE
        {
            change = Changed
            subchange = In-game UI polish pass - more spacious layouts, larger text, roomier buttons and camera controls
        }
        CHANGE
        {
            change = Fixed
            subchange = Camera IDs are now scoped to a flight session and freed when a craft is recovered or unloaded - relaunching a craft reliably restores its chosen IDs instead of them being bumped because a now-gone craft still held the number
            subchange = The web server no longer reaches into live in-game camera state from its request threads, removing a rare race that could surface as a crash near the web UI
            subchange = Two memory structures (the runtime camera-ID map and the finalized-recording set) no longer grow unbounded over a long session
            subchange = Camera windows now cascade on screen when opened instead of all stacking in the bottom-right corner
            subchange = Camera windows now open in full UI mode by default - minimal mode (preview only) can be enabled in settings or toggled per-window with a double-click
            subchange = Double-clicking the camera preview to toggle minimal mode now correctly resizes the window immediately (used to bug out and not properly resize until the next manual resize from the user)
        }
    }

    VERSION
    {
        version = 2.2.0.1
        CHANGE
        {
            change = Added
            subchange = Cameras can now be named & given a unique ID via the right-click part menu in the VAB - stored in the craft file, no external config needed
        }
        CHANGE
        {
            change = Fixed
            subchange = Opening more than 4 viewer tabs no longer stalls - the status poll in the viewer now only starts after signal loss, eliminating the persistent per-tab connection that was saturating the browser's HTTP/1.1 connection pool
            subchange = WebM VINT encoding bitwise-or on sign-extended operand
        }
    }

    VERSION
    {
        version = 2.2.0
        CHANGE
        {
            change = Changed
            subchange = Settings menu now auto-saves instead of requiring the user to click "Save" (which is now removed), and applies changes immediately without needing to close the menu
            subchange = Cleaned up disposition of Web UI
        }
        CHANGE
        {
            change = Added
            subchange = Docking camera overlay with telemetry (credits to andredichev for the PR)
            subchange = A new parameter FixedPreviewAspectRatio (boolean) to settings.cfg, allowing the in-game camera preview to be forced to a 1:1 aspect ratio (thanks to andredichev for the PR again)
            subchange = Mod version label in settings menu
            subchange = Minimal UI option in settings
            subchange = Fixed preview aspect ratio when FixedPreviewAspectRatio is enabled, so it doesn't stretch to fit the container (user setting, thanks to andredichev for the PR, once more :D)
            subchange = Added recording groups to allow recording a select subset of cameras within a group
        }
        CHANGE
        {
            change = Fixed
            subchange = Drag the in-game preview by the camera image (on large screens, it can be difficult to target the title bar with the mouse... courtesy of andredichev)
            subchange = More space for the streaming label (suggestions from KSP forums && changes by andredichev)
            subchange = Mac camera streaming now works via a synchronous GPU readback fallback (Metal does not support Unity's async readback API)
        }
    }

    VERSION
    {
        version = 2.1.0
        CHANGE
        {
            change = Added
            subchange = Draggable camera cards instead of static, "randomly" (not really :p) ordered camera cards
            subchange = New "render every other frame" setting exposed, allowing rendering every frame (with warning about performance)
        }
        CHANGE
        {
            change = Changed
            subchange = We now show live feed when camera is already being watched (costs no performance and nice to have)
            subchange = The camera status ("Idle" label, by default) clearer, i.e : when a camera being watched
            subchange = The two notes above close issue #13 proposing nice QoL changes
            subchange = Refactored the camera streaming JavaScript code (no functionality change)
            subchange = We now take a snapshot whenever camera goes to an inactive state from an active one doesn't watse ressources since it was active up until that point, smoothly allows to transition between active and inactive view
            subchange = Fix customlos.png not found (error 404) in some instances, where the code would mistakenly interpret is as always present when it's only conditionally there
            subchange = Watch button now still usable after camera disconnects (in cases where signal may come back)
            subchange = Bumped up default settings (performance improvements since v1.0.0 allows for that!!)
            subchange = Use Hullcam's FoV instead of our "own" FoV (still allow to modify it with the slider, but by default match Hullcam's if it's applicable)
        }
        CHANGE
        {
            change = Fixed
            subchange = Anti-Aliasing minimum option from 1 to 0 (so it's clearer 0 means NO AA)
            subchange = Mobile experience should feel a lot better with the new responsive layout and touch-friendly controls
        }
    }

    VERSION
    {
        version = 2.0.1
        CHANGE
        {
            change = Fixed
            subchange = "Stop" button now properly turns green if a client is requesting the camera feed
        }
    }

    VERSION
    {
        version = 2.0.0
        versionName = Web UI Recording, Polishing, QoL and more!
        CHANGE
        {
            change = Added
            subchange = Recording is now available in this new version
            subchange = Unified Settings & Integrations menu merging the former Settings and Debug menus into a single scrollable window with four collapsible sections: Stream/Capture, Visual Mod Integrations, Diagnostics, and Troubleshooting
            subchange = Visual mod integrations (Deferred, TUFX, Scatterer, EVE, Parallax, Firefly) are now toggleable directly from the unified menu with live availability indicators
            subchange = HullcamVDS Camera Filter integration - discovers the active Hullcam filter/overlay material at runtime via reflection and blits it over the stream frame; falls back silently to raw frame when unavailable or unset
            subchange = Integration enable/disable state now persists to settings.cfg and is restored on launch (previously runtime-only)
            subchange = Stream All button on in-game Flight UI - streams all available cameras in one click (shown only when more than one camera is available)
            subchange = Settings button on in-game Flight UI - opens the unified settings menu directly from the flight toolbar window
            subchange = Custom LOS screen support (drop customlos.png alongside los.png to override)
            subchange = GET /session endpoint returning a per-launch UUID, used by the web client to detect a fresh game session
            subchange = Troubleshooting section in the unified menu documenting when a camera or feed reload is needed, with a one-click "Reload Integrations" button
        }
        CHANGE
        {
            change = Fixed
            subchange = Persisted offline/destroyed camera cards from a previous game launch are now cleared on page load when a new game session is detected - the web client compares the stored session UUID against the server's and wipes localStorage on mismatch
            subchange = Firefox integration now properly allows recording (however, not constantly reliable, see known issues)
        }
        CHANGE
        {
            change = Changed
            subchange = Integration enable flags moved from JRTIDebugMenu (runtime-only statics) to JRTISettings (persisted properties) Parallax still defaults to false
            subchange = JRTIDebugMenu removed; all functionality absorbed into the unified JRTISettingsGUI
            subchange = Ctrl+Alt+F8 (former debug menu) and Ctrl+Alt+F9 (former settings) now both open the same unified menu
        }
        CHANGE
        {
            change = Known Issues
            subchange = Firefox recording output is unreliable - the recorded file may be corrupt or unplayable
            subchange = Stale zero-byte buffer files are sometimes left in the recordings folder after a recording session ends
            subchange = macOS is not properly supported - a GPU async API used by this Unity version is unavailable on macOS (legacy KSP/Unity quirk); a fix is being investigated
            subchange = Performance degradation with Parallax enabled - Parallax integration is disabled by default for this reason
        }
    }

    VERSION
    {
        version = 1.0.0
        CHANGE
        {
            change = Added
            subchange = Initial public release
        }
    }
}
